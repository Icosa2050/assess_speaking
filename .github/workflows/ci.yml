name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0 ffmpeg

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-playwright playwright

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run LIPS corpus pipeline smoke tests
        run: python -m unittest tests.test_lips_dataset tests.test_lips_manifest_pipeline -v

      - name: Run Playwright E2E tests
        run: python -m pytest -c pytest.e2e.ini tests/e2e
        env:
          STREAMLIT_HEADLESS: 'true'
          ASSESS_SPEAKING_DRY_RUN: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            traces
          if-no-files-found: ignore
