name: Real ASR (Self-hosted M4)

on:
  workflow_dispatch:
    inputs:
      whisper_model:
        description: "faster-whisper model to preload and test"
        required: false
        default: "tiny"

concurrency:
  group: real-asr-selfhosted-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sample-audio-integration:
    name: Sample Audio Integration (faster-whisper)
    runs-on: [self-hosted, macOS, ARM64, icosa-apple-ci, assess-speaking]
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHON_BIN: /opt/homebrew/bin/python3.12
      WHISPER_MODEL: ${{ inputs.whisper_model || 'tiny' }}
      ASR_COMPUTE_TYPE: default
      ASR_FALLBACK_COMPUTE_TYPE: int8
      RUN_AUDIO_INTEGRATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runner-local Python
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          "$PYTHON_BIN" -V
          "$PYTHON_BIN" -m venv "$RUNNER_TEMP/assess-speaking-venv"
          echo "$RUNNER_TEMP/assess-speaking-venv/bin" >> "$GITHUB_PATH"

      - name: Configure persistent model cache
        run: |
          echo "ARTIFACT_DIR=$RUNNER_TEMP/real-asr-artifacts" >> "$GITHUB_ENV"
          echo "XDG_CACHE_HOME=$HOME/.cache/assess-speaking" >> "$GITHUB_ENV"
          echo "HF_HOME=$HOME/.cache/assess-speaking/huggingface" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.cache/assess-speaking/huggingface" "$RUNNER_TEMP/real-asr-artifacts/reports"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Warm faster-whisper model cache
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from asr import transcribe

          result = transcribe(
              Path("samples/italian_demo.wav"),
              model_size=os.environ["WHISPER_MODEL"],
              compute_type=os.environ["ASR_COMPUTE_TYPE"],
              fallback_compute_type=os.environ["ASR_FALLBACK_COMPUTE_TYPE"],
          )
          print(
              {
                  "detected_language": result.get("detected_language"),
                  "compute_type_used": result.get("compute_type_used"),
                  "fallback_used": result.get("compute_fallback_used"),
              }
          )
          PY

      - name: Run sample-audio integration
        run: |
          set -o pipefail
          python -m unittest tests.test_sample_integration -v 2>&1 | tee "$ARTIFACT_DIR/sample-audio-integration.log"

      - name: Generate sample assessment report
        run: |
          set -o pipefail
          python assess_speaking.py \
            samples/italian_demo.wav \
            --whisper "$WHISPER_MODEL" \
            --theme "parla della tua giornata in italiano" \
            --target-duration-sec 60 \
            --log-dir "$ARTIFACT_DIR/reports" \
            --label "self-hosted-${WHISPER_MODEL}" \
            2>&1 | tee "$ARTIFACT_DIR/assessment-cli.log"

      - name: Capture runner metadata
        if: always()
        run: |
          {
            echo "python=$(python -V 2>&1)"
            echo "python_path=$(command -v python)"
            echo "whisper_model=$WHISPER_MODEL"
            echo "xdg_cache_home=$XDG_CACHE_HOME"
            echo "hf_home=$HF_HOME"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          } > "$ARTIFACT_DIR/metadata.txt"
          find "$HF_HOME/hub" -maxdepth 2 -type d 2>/dev/null | sort > "$ARTIFACT_DIR/hf-cache-tree.txt" || true
          find "$ARTIFACT_DIR/reports" -maxdepth 2 -type f | sort > "$ARTIFACT_DIR/report-files.txt" || true

      - name: Upload self-hosted ASR artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-asr-${{ inputs.whisper_model || 'tiny' }}-${{ github.run_id }}
          path: |
            ${{ env.ARTIFACT_DIR }}/sample-audio-integration.log
            ${{ env.ARTIFACT_DIR }}/assessment-cli.log
            ${{ env.ARTIFACT_DIR }}/metadata.txt
            ${{ env.ARTIFACT_DIR }}/hf-cache-tree.txt
            ${{ env.ARTIFACT_DIR }}/report-files.txt
            ${{ env.ARTIFACT_DIR }}/reports
          if-no-files-found: error
